---
layout: default
class: pg-post
---

<div class="post">
	<div class="header">
		<a href="{{ page.url }}">
			<h1 class="title">{{ page.title }}</h1>
		</a>
		<span class="date">{{ page.date | date: '%B %d, %Y' }}</span>
	</div>
	<div class="body">
		{{ content }}
	</div>
	<div class="footer">
		<a href="https://github.com/{{ site.github.user }}/{{ site.github.repository }}/commits/master/{{ page.path }}">
			<h2>History</h2>
		</a>
	</div>
</div>
