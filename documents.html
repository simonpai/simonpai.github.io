---
layout: default
class: pg-page
---

<div class="collections">
{% for c in site.collections %}
	{% assign c1 = c[1] %}
	{% assign c2 = site.data[c1.label] %}
	<div class="collection">
		<div class="header">
			<a href="{% if c2.url %}{{ c2.url }}{% else %}/{{ c1.label }}{% endif %}">
				<h2 class="title">{{ c2.title }}</h2>
			</a>
		</div>
		{% if c2.description %}
		<div class="body">
			{{ c2.description }}
		</div>
		{% endif %}
	</div>
{% endfor %}
</div>
